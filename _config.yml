title: "Glass Theme"
description: "A glassmorphism Jekyll theme with frosted glass UI, ambient backgrounds, and smooth animations."
url: "https://csswitch.github.io"
baseurl: "/jekyll-glass-theme"
author:
  name: "Your Name"
  email: "you@example.com"
  twitter: ""
  github: ""

glass:
  background: "aurora"
  accent_hue: 260
  orbs: true
  blur: 16
  smooth_scroll: true
  reading_progress: true

markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/
timezone: UTC
paginate: 6
paginate_path: "/page:num/"

plugins:
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor