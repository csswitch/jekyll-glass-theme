---
layout: default
---

<div class="glass-container">
  <div style="padding: 4rem 0 2rem">
    <h1 style="font-size: clamp(2rem, 5vw, 3rem); margin-bottom: 0.5rem; background: linear-gradient(135deg, white, rgba(255,255,255,0.7)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">{{ page.title }}</h1>
    {% if page.description %}
    <p style="color: rgba(255,255,255,0.55); margin: 0; font-size: 1.1rem;">{{ page.description }}</p>
    {% endif %}
  </div>

  <article class="post-body glass-card">
    {{ content }}
  </article>
</div>
