<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>
  <!-- Frosted glass pane -->
  <rect x="4" y="4" width="24" height="24" rx="6" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <!-- Inner glow -->
  <rect x="5" y="5" width="22" height="10" rx="5" fill="rgba(255,255,255,0.12)"/>
  <!-- Accent dot -->
  <circle cx="16" cy="16" r="5" fill="url(#g)" opacity="0.9"/>
  <circle cx="16" cy="16" r="5" fill="url(#g)" filter="url(#blur)" opacity="0.5"/>
</svg>
